<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crazy Durak</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="./styles/main.css">
  </head>
  <body>
    <div id="app">
      <section id="start-screen" class="screen start-screen" aria-labelledby="start-title">
        <div class="start-panel">
          <h1 id="start-title">Crazy Durak</h1>
          <button id="start-button" class="primary-action" type="button">Начать игру</button>
        </div>
      </section>

      <section id="game-screen" class="screen game-screen is-hidden" aria-label="Игровой стол">
        <header class="game-header">
          <button id="home-button" class="home-action" type="button">На главную</button>
        </header>

        <main class="game-board">
          <section class="opponent-zone" aria-label="Противник">
            <div class="opponent-hand-viewport">
              <div id="opponent-hand" class="opponent-hand"></div>
            </div>
          </section>

          <aside class="side-zone log-zone" aria-label="Лог событий">
            <div class="side-heading">
              <span class="pile-label">События</span>
            </div>
            <ol id="event-log" class="event-log"></ol>
          </aside>

          <section id="table-drop-zone" class="play-table" data-drop-target="table" aria-label="Поле боя">
            <div id="battle-row" class="battle-row"></div>
            <p id="table-hint" class="table-hint">Перетащите карту на поле</p>
          </section>

          <aside class="side-zone deck-zone" aria-label="Колода и бито">
            <div class="counter-group">
              <span class="pile-label">Бито</span>
              <strong id="discard-count">0</strong>
              <span>карт</span>
            </div>
            <div class="counter-group deck-counter">
              <span class="pile-label">Колода</span>
              <strong id="deck-count">0</strong>
              <span>карт</span>
            </div>
            <div id="trump-card-slot" class="trump-card-slot"></div>
          </aside>
          <footer class="player-area" aria-label="Карты игрока">
            <div class="player-controls">
              <button id="take-button" class="secondary-action" type="button">Взять</button>
              <button id="finish-button" class="secondary-action" type="button">Бито</button>
              <button id="help-button" class="help-action" type="button" aria-label="Справочник эффектов">?</button>
            </div>
            <div class="hand-slider">
              <button id="hand-prev" class="hand-arrow" type="button" aria-label="Прокрутить карты игрока влево">‹</button>
              <div id="player-hand-viewport" class="player-hand-viewport">
                <div id="player-hand" class="player-hand"></div>
              </div>
              <button id="hand-next" class="hand-arrow" type="button" aria-label="Прокрутить карты игрока вправо">›</button>
            </div>
          </footer>
        </main>
      </section>

      <div id="effect-tooltip" class="effect-tooltip is-hidden" role="tooltip">
        <div class="effect-tooltip-icon" aria-hidden="true"></div>
        <div>
          <strong class="effect-tooltip-title"></strong>
          <p class="effect-tooltip-copy"></p>
        </div>
      </div>

      <div id="glossary-modal" class="glossary-overlay is-hidden" role="dialog" aria-modal="true" aria-labelledby="glossary-title">
        <div class="glossary-panel">
          <div class="glossary-header">
            <h2 id="glossary-title" class="glossary-title">Эффекты карт</h2>
            <button id="glossary-close" class="glossary-close" type="button" aria-label="Закрыть">✕</button>
          </div>
          <ul id="glossary-list" class="glossary-list"></ul>
        </div>
      </div>

      <div id="result-modal" class="modal is-hidden" role="dialog" aria-modal="true" aria-labelledby="result-title">
        <div class="modal-panel">
          <p class="eyebrow">Партия завершена</p>
          <h2 id="result-title">Результат</h2>
          <p id="result-copy">Игра окончена.</p>
          <button id="modal-new-game" class="primary-action" type="button">Сыграть еще</button>
        </div>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
